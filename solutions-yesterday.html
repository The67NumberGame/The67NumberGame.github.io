<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

.page{max-width:680px;margin:0 auto;padding:40px 24px 60px}

.num-tile{width:72px;height:72px;background:var(--card);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;box-shadow:0 3px 10px rgba(0,0,0,.12)}

.loading{text-align:center;padding:40px;color:var(--grey);font-size:15px}

.footer{text-align:center;padding:18px 0 10px;border-top:1px solid #ccc8be;margin-top:28px;display:flex;justify-content:center;flex-wrap:wrap;gap:18px}

<script>
const PUZZLES=[[4, 5, 7, 14], [2, 8, 9, 12], [3, 13, 14, 16], [5, 6, 8, 18], [4, 9, 15, 16], [5, 8, 12, 14], [1, 8, 10, 11], [3, 5, 10, 12], [1, 3, 11, 20], [2, 3, 10, 12], [8, 11, 15, 17], [1, 5, 12, 16], [3, 4, 8, 16], [6, 7, 10, 15], [3, 4, 14, 19], [1, 2, 4, 19], [3, 15, 16, 19], [3, 12, 13, 17], [1, 2, 3, 5], [1, 4, 9, 17], [2, 5, 9, 20], [5, 14, 15, 18], [3, 7, 10, 18], [10, 13, 17, 18], [2, 4, 15, 20], [1, 2, 3, 8], [4, 7, 11, 18], [6, 7, 13, 18], [2, 3, 7, 8], [3, 10, 13, 18], [2, 9, 13, 18], [6, 10, 13, 19], [7, 9, 14, 16], [2, 3, 5, 9], [2, 8, 13, 20], [4, 16, 18, 19], [2, 4, 11, 12], [1, 4, 11, 18], [3, 7, 18, 20], [1, 2, 4, 14], [13, 16, 18, 19], [6, 7, 8, 18], [10, 17, 19, 20], [6, 8, 18, 19], [1, 2, 8, 17], [5, 10, 12, 16], [6, 9, 13, 18], [13, 17, 18, 20], [2, 4, 5, 10], [6, 9, 12, 16], [1, 8, 9, 14], [1, 4, 5, 12], [2, 7, 13, 15], [7, 8, 13, 16], [6, 7, 8, 11], [6, 15, 18, 19], [4, 6, 10, 19], [2, 3, 14, 15], [1, 11, 14, 20], [1, 2, 9, 15], [1, 5, 12, 17], [1, 5, 14, 16], [2, 10, 15, 19], [1, 3, 8, 9], [1, 3, 6, 20], [3, 4, 15, 19], [1, 4, 5, 14], [5, 9, 12, 16], [3, 5, 11, 20], [3, 7, 12, 18], [2, 6, 8, 16], [2, 6, 9, 15], [2, 3, 10, 16], [2, 8, 9, 10], [4, 5, 11, 19], [1, 3, 15, 19], [2, 16, 17, 18], [3, 4, 8, 13], [10, 18, 19, 20], [6, 14, 17, 20], [3, 4, 10, 12], [9, 12, 16, 17], [1, 3, 11, 19], [2, 3, 4, 11], [6, 10, 16, 19], [6, 10, 13, 15], [5, 8, 13, 14], [1, 4, 9, 20], [4, 12, 15, 18], [2, 5, 12, 14], [3, 4, 15, 20], [2, 3, 6, 17], [3, 8, 13, 16], [5, 7, 9, 16], [4, 7, 8, 9], [2, 7, 15, 17], [2, 10, 14, 19], [1, 8, 11, 20], [4, 5, 13, 20], [2, 5, 6, 15], [3, 8, 12, 13]];

function getYesterdaysPuzzle() {
  const epoch = Date.UTC(2025, 0, 1);
  const now = new Date();
  const today = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate());
  const dayIdx = Math.floor((today - epoch) / 86400000) - 1;
  const idx = ((dayIdx % PUZZLES.length) + PUZZLES.length) % PUZZLES.length;
  return { nums: [...PUZZLES[idx]], puzzleNum: idx + 1 };
}

// ── Solver ──
// Returns array of {val, expr} for all ways to combine the given numbers.
// Rules: !, ^ must use raw puzzle numbers only.

function fact(n) {
  if (!Number.isInteger(n) || n < 0 || n > 20) return null;
  let f = 1; for (let i = 2; i <= n; i++) f *= i;
  return f;
}

// Generate all permutations of an array
function perms(arr) {
  if (arr.length === 0) return [[]];
  if (arr.length === 1) return [[arr[0]]];
  const out = [];
  for (let i = 0; i < arr.length; i++) {
    const rest = arr.filter((_, j) => j !== i);
    for (const p of perms(rest)) out.push([arr[i], ...p]);
  }
  return out;
}

// Split indices 0..n-1 into two non-empty groups in all ways
// (keeping 0 always in left to avoid duplicate splits)
function splits(n) {
  const out = [];
  for (let mask = 1; mask < (1 << n) - 1; mask++) {
    if (!(mask & 1)) continue; // keep index 0 in left
    const left = [], right = [];
    for (let i = 0; i < n; i++) (mask >> i & 1 ? left : right).push(i);
    out.push([left, right]);
  }
  return out;
}

// Each result: { val: number, expr: string, isRaw: bool }
// isRaw = true means this value came directly from a single puzzle number (usable as ! or ^ exponent)

function allResults(nums) {
  if (nums.length === 1) {
    const n = nums[0];
    const base = [{ val: n, expr: String(n), isRaw: true }];
    // Also offer n! as a derived value from this single raw number
    const f = fact(n);
    if (f !== null && isFinite(f) && f <= 1e12) {
      base.push({ val: f, expr: `${n}!`, isRaw: false });
    }
    return base;
  }

  const results = [];
  for (const [leftIdx, rightIdx] of splits(nums.length)) {
    const leftNums = leftIdx.map(i => nums[i]);
    const rightNums = rightIdx.map(i => nums[i]);
    const leftRes = allResults(leftNums);
    const rightRes = allResults(rightNums);

    for (const L of leftRes) {
      for (const R of rightRes) {
        // + 
        push(results, L.val + R.val, `(${L.expr}+${R.expr})`);
        // - both ways
        push(results, L.val - R.val, `(${L.expr}-${R.expr})`);
        push(results, R.val - L.val, `(${R.expr}-${L.expr})`);
        // *
        push(results, L.val * R.val, `(${L.expr}×${R.expr})`);
        // / both ways
        if (R.val !== 0) push(results, L.val / R.val, `(${L.expr}÷${R.expr})`);
        if (L.val !== 0) push(results, R.val / L.val, `(${R.expr}÷${L.expr})`);
        // ^ : exponent must be raw
        if (R.isRaw && R.val >= 0 && R.val <= 10) {
          const p = Math.pow(L.val, R.val);
          if (isFinite(p) && Math.abs(p) <= 1e12) push(results, p, `(${L.expr}^${R.expr})`);
        }
        if (L.isRaw && L.val >= 0 && L.val <= 10) {
          const p = Math.pow(R.val, L.val);
          if (isFinite(p) && Math.abs(p) <= 1e12) push(results, p, `(${R.expr}^${L.expr})`);
        }
      }
    }
  }
  return results;
}

function push(arr, val, expr) {
  if (isFinite(val) && Math.abs(val) <= 1e12) arr.push({ val, expr, isRaw: false });
}

function solve(nums) {
  const seen = new Set();
  const solutions = [];
  for (const perm of perms(nums)) {
    for (const r of allResults(perm)) {
      const v = Math.round(r.val * 1e9) / 1e9;
      if (v === 67 && !seen.has(r.expr)) {
        seen.add(r.expr);
        solutions.push(r.expr);
      }
    }
  }
  return solutions;
}

// ── UI ──
const { nums, puzzleNum } = getYesterdaysPuzzle();

document.getElementById('puzzleLabel').textContent =
  `Yesterday's Puzzle #${puzzleNum} — Numbers: ${nums.join(', ')}`;

const numsDisplay = document.getElementById('numsDisplay');
for (const n of nums) {
  const d = document.createElement('div');
  d.className = 'num-tile';
  d.textContent = n;
  numsDisplay.appendChild(d);
}

// Run solver async so UI can render first
setTimeout(() => {
  const solutions = solve(nums);

  document.getElementById('loadingMsg').style.display = 'none';

  const grid = document.getElementById('solutionsGrid');
  const countInfo = document.getElementById('countInfo');

  if (solutions.length === 0) {
    countInfo.textContent = 'No standard solutions found for this puzzle.';
    countInfo.style.display = 'block';
    return;
  }

  // Deduplicate and sort by expression length
  const unique = [...new Set(solutions)].sort((a, b) => a.length - b.length);

  countInfo.textContent = `${unique.length} solution${unique.length !== 1 ? 's' : ''} found`;
  countInfo.style.display = 'block';

  for (const expr of unique) {
    const card = document.createElement('div');
    card.className = 'sol-card';
    const exprEl = document.createElement('span');
    exprEl.className = 'sol-expr';
    exprEl.textContent = expr;
    const eq = document.createElement('span');
    eq.className = 'sol-eq';
    eq.textContent = '= 67 ✓';
    card.appendChild(exprEl);
    card.appendChild(eq);
    grid.appendChild(card);
  }
}, 50);
</script>
